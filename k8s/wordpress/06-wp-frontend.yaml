apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: markpotter/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_WORDPRESS_API_URL
              value: "http://nginx-wp.default.svc.cluster.local/wp-json"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: default
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  rules:
    - host: mark-potter.com
      http:
        paths:
          - path: /wp-json
            pathType: Prefix
            backend:
              service:
                name: nginx-wp
                port:
                  number: 80
          - path: /wp-admin
            pathType: Prefix
            backend:
              service:
                name: nginx-wp
                port:
                  number: 80
          - path: /wp-content
            pathType: Prefix
            backend:
              service:
                name: nginx-wp
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
