apiVersion: v1
kind: ConfigMap
metadata:
  name: php-fpm-config
  namespace: default
data:
  zz-docker.conf: |
    [global]
    daemonize = no
    
    [www]
    listen = 9000
    pm = dynamic
    pm.max_children = 50
    pm.start_servers = 5
    pm.min_spare_servers = 5
    pm.max_spare_servers = 35
